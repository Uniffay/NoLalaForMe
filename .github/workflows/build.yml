name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "dalamud.zip"
          Expand-Archive -Force "dalamud.zip" "$env:APPDATA\XIVLauncher\addon\Hooks\dev\"

      - name: Restore
        run: dotnet restore NoLalaForMe.sln

      - name: Build
        run: dotnet build NoLalaForMe.sln --configuration Release --no-restore

      - name: Get version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "NoLalaForMe/NoLalaForMe.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "NoLalaForMe/bin/x64/Release/NoLalaForMe.dll",
                  "NoLalaForMe/bin/x64/Release/NoLalaForMe.json" `
            -DestinationPath "latest.zip"

      - name: Update repo.json
        shell: pwsh
        run: |
          $json = Get-Content "repo.json" | ConvertFrom-Json
          $json[0].AssemblyVersion = "${{ steps.version.outputs.version }}"
          $json[0].LastUpdate = [int][double]::Parse((Get-Date -UFormat %s))
          $json[0].DownloadLinkInstall = "https://github.com/${{ github.repository }}/releases/latest/download/latest.zip"
          $json[0].DownloadLinkUpdate = "https://github.com/${{ github.repository }}/releases/latest/download/latest.zip"
          $json[0].RepoUrl = "https://github.com/${{ github.repository }}"
          @($json) | ConvertTo-Json -Depth 10 | Set-Content "repo.json"

      - name: Commit repo.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "ci: update repo.json to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: latest.zip
          make_latest: true
